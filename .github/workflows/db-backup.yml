name: Daily database backup

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    # Use the official Postgres 16 image — gives us pg_dump matching Render's
    # server version, with no apt-get install dance required.
    container:
      image: postgres:16
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run backup script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_DIR: /tmp/backups
          RETAIN_DAYS: "30"
        run: |
          mkdir -p "$BACKUP_DIR"
          chmod +x nomachibot-api/scripts/backup.sh
          bash nomachibot-api/scripts/backup.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomachibot-backup-${{ github.run_id }}
          path: /tmp/backups/*.sql.gz
          retention-days: 90
